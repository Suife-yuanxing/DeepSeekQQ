<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>微信通道 — UI 原型</title>
<link rel="stylesheet" href="shared/tokens.css">
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/components.css">
<link rel="stylesheet" href="shared/anime-cat.css">
<link rel="stylesheet" href="shared/dark-mode.css">
<link rel="stylesheet" href="shared/effects.css">
<style>
/* ===== 微信通道 — 页面专属样式 ===== */
.scroll-area { padding: 12px 0 8px; }

/* 未绑定状态卡片 — 暖灰调 */
.status-card {
  margin: 8px 20px; padding: 18px 16px;
  background: linear-gradient(135deg, #B0A8C0 0%, #C8C0D8 50%, #D8D0E8 100%);
  border-radius: 18px; color: #fff;
  box-shadow: 0 8px 24px rgba(160,150,180,0.25);
  display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
}
.status-card::after {
  content: ''; position: absolute; top: -30%; left: -30%;
  width: 80%; height: 100%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.status-card .sc-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
}
.status-card .sc-icon svg { width: 26px; height: 26px; }
.status-card .sc-info { position: relative; z-index: 1; }
.status-card .sc-label { font-size: 13px; font-weight: 700; }
.status-card .sc-detail { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.status-card .sc-badge {
  position: relative; z-index: 1; margin-left: auto;
  background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.3);
  padding: 6px 14px; border-radius: 12px;
  font-size: 12px; font-weight: 700;
}

/* 功能介绍卡片 */
.feature-card {
  margin: 6px 20px; padding: 16px;
  background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
  border-radius: 18px;
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow: 0 3px 12px rgba(100,100,120,0.05);
}
.feature-card .fc-title {
  font-size: 15px; font-weight: 700; color: #3A2030; margin-bottom: 12px;
}
.feature-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
}
.feature-item + .feature-item { border-top: 1px solid rgba(0,0,0,0.04); }
.feature-item .fi-icon {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  margin-top: 2px;
}
.fi-green { background: rgba(76,175,80,0.1); color: #4CAF50; }
.fi-pink { background: rgba(244, 114, 182,0.1); color: #F472B6; }
.fi-purple { background: rgba(124,92,191,0.1); color: #C4B5FD; }
.fi-orange { background: rgba(255,179,71,0.1); color: #FFB347; }
.feature-item .fi-icon svg { width: 16px; height: 16px; }
.feature-item .fi-text { flex: 1; }
.feature-item .fi-title { font-size: 13px; font-weight: 700; color: #3A2030; }
.feature-item .fi-desc { font-size: 11px; color: #B090A0; margin-top: 1px; }

/* 绑定步骤卡片 */
.bind-card {
  margin: 6px 20px; padding: 20px 16px;
  background: linear-gradient(135deg, rgba(124,92,191,0.06) 0%, rgba(180,150,220,0.1) 100%);
  border-radius: 18px;
  border: 1.5px solid rgba(124,92,191,0.15);
  text-align: center;
}
.bind-card .bind-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, #C4B5FD, #9B7ED8);
  margin: 0 auto 12px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 18px rgba(124,92,191,0.2);
}
.bind-card .bind-icon svg { width: 28px; height: 28px; color: #fff; }
.bind-card .bind-title { font-size: 16px; font-weight: 800; color: #3A2030; margin-bottom: 4px; }
.bind-card .bind-desc { font-size: 12px; color: #B090A0; margin-bottom: 16px; line-height: 1.5; }
.bind-btn {
  display: inline-block; padding: 12px 40px; border-radius: 14px;
  background: linear-gradient(135deg, #C4B5FD, #9B7ED8);
  color: #fff; border: none; font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  box-shadow: 0 6px 18px rgba(124,92,191,0.25);
  transition: all 0.25s;
}
.bind-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(124,92,191,0.35); }
.bind-btn:active { transform: scale(0.97); }

/* Step indicators */
.steps-row { display: flex; gap: 8px; margin: 6px 20px; }
.step-card {
  flex: 1; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
  border-radius: 14px; padding: 12px 8px; text-align: center;
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow: 0 3px 12px rgba(100,100,120,0.05);
}
.step-card .st-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(135deg, #C4B5FD, #9B7ED8);
  color: #fff; font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 6px;
}
.step-card .st-title { font-size: 11px; font-weight: 700; color: #3A2030; }
.step-card .st-desc { font-size: 10px; color: #B090A0; margin-top: 2px; }

/* ===== Dark Mode ===== */
.phone.dark-mode .status-card { background: linear-gradient(135deg, #5A5270 0%, #6A6278 50%, #7A7288 100%); box-shadow: 0 8px 24px rgba(90,82,112,0.25); }
.phone.dark-mode .feature-card { background: #16213E; border-color: rgba(255,255,255,0.06); }
.phone.dark-mode .feature-card .fc-title { color: #E0D8E8; }
.phone.dark-mode .feature-item .fi-title { color: #E0D8E8; }
.phone.dark-mode .feature-item .fi-desc { color: #8078A0; }
.phone.dark-mode .feature-item + .feature-item { border-top-color: rgba(255,255,255,0.04); }
.phone.dark-mode .bind-card { background: rgba(124,92,191,0.08); border-color: rgba(124,92,191,0.15); }
.phone.dark-mode .bind-card .bind-title { color: #E0D8E8; }
.phone.dark-mode .bind-card .bind-desc { color: #8078A0; }
.phone.dark-mode .step-card { background: #16213E; border-color: rgba(255,255,255,0.06); }
.phone.dark-mode .step-card .st-title { color: #E0D8E8; }
.phone.dark-mode .step-card .st-desc { color: #8078A0; }
</style>
</head>
<body>
<div class="phone" id="phoneFrame">
  <div class="title-bar">
    <span class="title">微信通道</span>
    <button class="btn-icon-round" onclick="showToast('暂无更多操作')" title="更多">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
  </div>

  <div class="scroll-area">
    <!-- 状态卡片 -->
    <div class="status-card">
      <div class="sc-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>
      </div>
      <div class="sc-info">
        <div class="sc-label">未绑定</div>
        <div class="sc-detail">微信通道未激活</div>
      </div>
      <div class="sc-badge">待设置</div>
    </div>

    <!-- 功能介绍 -->
    <div class="group-title" style="margin:14px 20px 6px;">接入后你将获得</div>
    <div class="feature-card">
      <div class="feature-item">
        <div class="fi-icon fi-pink">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16v13H8l-4 4v-4H4z"/></svg>
        </div>
        <div class="fi-text">
          <div class="fi-title">微信消息同步</div>
          <div class="fi-desc">Bot 在微信中接收和回复消息，覆盖微信好友和群聊</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="fi-icon fi-green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="fi-text">
          <div class="fi-title">多 Bot 协作</div>
          <div class="fi-desc">同一个 Bot 可同时在 QQ 和微信运行，人格保持一致</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="fi-icon fi-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
        </div>
        <div class="fi-text">
          <div class="fi-title">统一数据看板</div>
          <div class="fi-desc">微信和 QQ 的对话数据汇总统计，掌握全渠道动态</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="fi-icon fi-orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
        </div>
        <div class="fi-text">
          <div class="fi-title">智能通知推送</div>
          <div class="fi-desc">Bot 事件实时推送到微信，不错过每一条重要消息</div>
        </div>
      </div>
    </div>

    <!-- 接入步骤 -->
    <div class="group-title" style="margin:14px 20px 6px;">接入步骤</div>
    <div class="steps-row">
      <div class="step-card">
        <div class="st-num">1</div>
        <div class="st-title">扫码登录</div>
        <div class="st-desc">微信扫码验证身份</div>
      </div>
      <div class="step-card">
        <div class="st-num">2</div>
        <div class="st-title">授权配置</div>
        <div class="st-desc">选择同步范围和权限</div>
      </div>
      <div class="step-card">
        <div class="st-num">3</div>
        <div class="st-title">一键激活</div>
        <div class="st-desc">确认后立即可用</div>
      </div>
    </div>

    <!-- 绑定操作 -->
    <div class="bind-card" style="margin-top:14px;">
      <div class="bind-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
      </div>
      <div class="bind-title">绑定微信通道</div>
      <div class="bind-desc">仅需 3 步，让 Bot 接入微信<br>支持个人微信与企业微信</div>
      <button class="bind-btn" onclick="handleBind()">立即绑定</button>
    </div>

    <!-- 帮助提示 -->
    <div class="feature-card" style="margin-top:12px; text-align:center;">
      <div style="font-size:12px; color:#B090A0; line-height:1.6;">
        绑定过程中遇到问题？<br>
        <a href="#" style="color:#C4B5FD; font-weight:600;" onclick="showToast('帮助文档建设中');return false;">查看接入文档</a>
        &nbsp;·&nbsp;
        <a href="#" style="color:#C4B5FD; font-weight:600;" onclick="showToast('暂无常见问题');return false;">常见问题</a>
      </div>
    </div>
    <div style="height:20px;"></div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav" id="bottomNav">
    <a class="nav-item" href="首页仪表盘.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/></svg>
      首页
    </a>
    <a class="nav-item" href="聊天页.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v13H8l-4 4v-4H4z"/></svg>
      聊天
    </a>
    <a class="nav-item" href="我的Bot.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><circle cx="10" cy="7" r="1" fill="currentColor" stroke="none"/><circle cx="14" cy="7" r="1" fill="currentColor" stroke="none"/></svg>
      Bot管理
    </a>
    <a class="nav-item" href="我的.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M7 18c0-2 2.2-4 5-4s5 2 5 4"/></svg>
      我的
    </a>
  </div>
</div>

<script>
function handleBind() {
  // 模拟绑定流程弹窗
  if (confirm('模拟绑定流程：\n\n1. 将打开微信扫码页面\n2. 扫码后选择授权范围\n3. 确认绑定\n\n（原型演示，点击确定模拟完成）')) {
    var btn = document.querySelector('.bind-btn');
    btn.textContent = '绑定中...';
    btn.disabled = true;
    btn.style.opacity = '0.7';
    setTimeout(function() {
      showToast('微信通道绑定成功！', 'success');
      btn.textContent = '已绑定 ✓';
      btn.style.background = 'linear-gradient(135deg, #4CAF50, #66BB6A)';
      btn.style.boxShadow = '0 6px 18px rgba(76,175,80,0.25)';
      // 更新状态卡片
      var sc = document.querySelector('.status-card');
      sc.style.background = 'linear-gradient(135deg, #4CAF50 0%, #66BB6A 50%, #81C784 100%)';
      sc.style.boxShadow = '0 8px 24px rgba(76,175,80,0.25)';
      sc.querySelector('.sc-label').textContent = '已连接';
      sc.querySelector('.sc-detail').textContent = '微信 Bot · 运行正常';
      sc.querySelector('.sc-badge').textContent = 'v1.0.0';
      // 更新图标
      sc.querySelector('.sc-icon svg').innerHTML = '<circle cx="12" cy="12" r="10"/><path d="M7 13l3 3 7-7"/>';
    }, 1500);
  }
}
</script>
<script src="shared/config.js"></script>
<script src="shared/api.js"></script>
<script src="shared/app.js">
// Load WeChat channel status
if (API.isLoggedIn()) {
  function loadWxStatus() {
    API.getWechatStatus().then(function(wx) {
      var statusEl = document.querySelector('[data-wx-status]') || document.querySelector('.wx-status');
      if (statusEl) {
        statusEl.textContent = wx.bound ? '已绑定' : '未绑定';
      }
      var boundEl = document.querySelector('[data-wx-bound]');
      if (boundEl) boundEl.textContent = wx.bound ? '是' : '否';
    }).catch(function() {});
  }
  loadWxStatus();
}

</script>
</body>
</html>
