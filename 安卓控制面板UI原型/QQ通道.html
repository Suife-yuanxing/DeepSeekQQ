<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>QQ 通道 — UI 原型</title>
<link rel="stylesheet" href="shared/tokens.css">

<link rel="stylesheet" href="shared/components.css">

<style>
/* ===== QQ 通道 — 页面专属样式 ===== */
.scroll-area { padding: 12px 0 8px; }

/* 连接状态卡片 */
.status-card {
  margin: 8px 20px; padding: 18px 16px;
  background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 50%, #81C784 100%);
  border-radius: 18px; color: #fff;
  box-shadow: 0 8px 24px rgba(76,175,80,0.25);
  display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
}
.status-card::after {
  content: ''; position: absolute; top: -30%; left: -30%;
  width: 80%; height: 100%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.status-card .sc-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
}
.status-card .sc-icon svg { width: 26px; height: 26px; }
.status-card .sc-info { position: relative; z-index: 1; }
.status-card .sc-label { font-size: 13px; font-weight: 700; }
.status-card .sc-detail { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.status-card .sc-badge {
  position: relative; z-index: 1; margin-left: auto;
  background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.3);
  padding: 6px 14px; border-radius: 12px;
  font-size: 12px; font-weight: 700;
}

/* 信息卡片 */
.info-card {
  margin: 6px 20px; padding: 16px;
  background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
  border-radius: 18px;
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow: 0 3px 12px rgba(100,100,120,0.05);
}
.info-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
}
.info-row + .info-row { border-top: 1px solid rgba(0,0,0,0.04); }
.info-row .ir-label { font-size: 13px; color: #B090A0; }
.info-row .ir-value { font-size: 13px; font-weight: 700; color: #3A2030; display: flex; align-items: center; gap: 6px; }
.info-row .ir-value .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.info-row .ir-value .dot.green { background: #4CAF50; }

/* Mini stat grid */
.stat-mini-row { display: flex; gap: 10px; margin: 6px 20px; }
.stat-mini {
  flex: 1; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
  border-radius: 16px; padding: 12px; text-align: center;
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow: 0 3px 12px rgba(100,100,120,0.05);
}
.stat-mini .sm-value { font-size: 20px; font-weight: 800; }
.stat-mini .sm-label { font-size: 11px; color: #B090A0; margin-top: 2px; }
.sm-green { color: #4CAF50; }
.sm-pink { color: #F472B6; }

/* Danger zone */
.danger-zone { margin: 16px 20px; }
.danger-btn {
  width: 100%; padding: 14px; border-radius: 16px;
  background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
  color: #F472B6; border: 1.5px solid rgba(244, 114, 182,0.2);
  font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: all 0.25s;
}
.danger-btn:hover { background: #F472B6; color: #fff; border-color: #F472B6; }
.danger-btn:active { transform: scale(0.97); }

/* ===== Dark Mode ===== */
.phone.dark-mode .status-card { box-shadow: 0 8px 24px rgba(76,175,80,0.15); }
.phone.dark-mode .info-card { background: #16213E; border-color: rgba(255,255,255,0.06); }
.phone.dark-mode .info-row .ir-label { color: #8078A0; }
.phone.dark-mode .info-row .ir-value { color: #E0D8E8; }
.phone.dark-mode .info-row + .info-row { border-top-color: rgba(255,255,255,0.04); }
.phone.dark-mode .stat-mini { background: #16213E; border-color: rgba(255,255,255,0.06); }
.phone.dark-mode .stat-mini .sm-label { color: #8078A0; }
.phone.dark-mode .danger-btn { background: #16213E; border-color: rgba(244, 114, 182,0.2); }
.phone.dark-mode .danger-btn:hover { background: #F472B6; }
</style>

<script>
// Counter animation
(function() {
  var counters = [
    { el: document.getElementById('msgCount'), target: 156 },
    { el: document.getElementById('groupCount'), target: 12 }
  ];
  counters.forEach(function(c) {
    if (!c.el) return;
    var duration = 600, start = performance.now();
    function update(now) {
      var p = Math.min((now - start) / duration, 1);
      var eased = 1 - Math.pow(1 - p, 3);
      c.el.textContent = Math.round(c.target * eased);
      if (p < 1) requestAnimationFrame(update);
      else c.el.textContent = c.target;
    }
    c.el.textContent = '0';
    requestAnimationFrame(update);
  });
})();
</script>
<script src="shared/config.js"></script>
<script src="shared/api.js"></script>
<script src="shared/app.js">
// Load QQ channel status
if (API.isLoggedIn()) {
  function loadQQStatus() {
    API.getQQStatus().then(function(qq) {
      // Update connection status
      var statusEl = document.querySelector('.conn-status') || document.querySelector('[data-qq-status]');
      if (statusEl) {
        statusEl.textContent = qq.connected ? '已连接' : '未连接';
        statusEl.className = (statusEl.className || '').replace(/\bon\b|\boff\b/g, '') + (qq.connected ? ' on' : ' off');
      }
      var qqNumEl = document.querySelector('[data-qq-number]') || document.querySelector('.qq-number');
      if (qqNumEl && qq.qq_number) qqNumEl.textContent = qq.qq_number;
    }).catch(function() {});
    API.getQQStats().then(function(s) {
      var msgEl = document.querySelector('[data-msg-count]');
      if (msgEl) msgEl.textContent = s.message_count || 0;
      var grpEl = document.querySelector('[data-group-count]');
      if (grpEl) grpEl.textContent = s.active_groups || 0;
    }).catch(function() {});
    API.getQQRecentMessages(3).then(function(d) {
      var container = document.querySelector('[data-recent-msgs]');
      if (container && d.messages) {
        container.innerHTML = d.messages.map(function(m) {
          return '<div class="msg-item"><span class="msg-source">' + (m.source || '') + '</span><span class="msg-text">' + (m.content || '') + '</span></div>';
        }).join('');
      }
    }).catch(function() {});
  }
  loadQQStatus();
  setInterval(loadQQStatus, 30000); // auto refresh every 30s
}

</script>
