<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

<style>
/* ===== Page-Specific: 首页仪表盘 v2 ===== */

/* Staggered card entrance */
@keyframes card-in {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes card-in-dim {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 0.45; transform: translateY(0); }
}
.bot-card, .section-label, .stat-card, .quick-action, .channel-card {
  opacity: 0;
  animation: card-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
/* 离线通道卡片保持 dim 状态，但动画节奏与在线卡片同步 */
.channel-card.offline {
  opacity: 0;                                  /* 动画开始前隐藏，避免闪烁 */
  animation: card-in-dim 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.stats-row .stat-card:nth-child(1) { animation-delay: 0.35s; }
.stats-row .stat-card:nth-child(2) { animation-delay: 0.4s; }
.stats-row .stat-card:nth-child(3) { animation-delay: 0.45s; }
.quick-actions .quick-action:nth-child(1) { animation-delay: 0.45s; }
.quick-actions .quick-action:nth-child(2) { animation-delay: 0.5s; }
.quick-actions .quick-action:nth-child(3) { animation-delay: 0.55s; }
.quick-actions .quick-action:nth-child(4) { animation-delay: 0.6s; }
.channel-row .channel-card:nth-child(1) { animation-delay: 0.55s; }
.channel-row .channel-card:nth-child(2) { animation-delay: 0.6s; }

/* Status dot pulse (uses shared keyframes from effects.css but needs selector override) */
.ch-status .dot.on {
  animation: status-pulse 2s ease-in-out infinite;
}

/* ===== 顶部 ===== */
.top-bar {
  padding: 48px 20px 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.top-bar .greeting { font-size: 13px; color: #C090A0; }
.top-bar .username { font-size: 21px; font-weight: 800; color: #3A2030; }
.top-actions { display: flex; gap: 10px; }
.top-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.7); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #B090A0; transition: all 0.25s;
  box-shadow: 0 2px 8px rgba(244, 114, 182,0.06);
}
.top-btn:hover { background: #fff; color: #F472B6; box-shadow: 0 4px 12px rgba(244, 114, 182,0.12); }
.top-btn svg { width: 18px; height: 18px; }

/* ===== Bot 卡片 ===== */
.bot-card {
  margin: 8px 20px 0;
  background: linear-gradient(135deg, #F472B6 0%, #FF8095 40%, #FFB0A0 100%);
  border-radius: 22px; padding: 18px 18px 16px; color: #fff;
  box-shadow: 0 8px 24px rgba(244, 114, 182,0.3);
  cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
}
.bot-card:active { transform: scale(0.98); }
.bot-card::after {
  content: ''; position: absolute; top: -30%; left: -30%;
  width: 80%; height: 100%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.bot-card .row { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
.bot-card .bot-info { display: flex; align-items: center; gap: 12px; }
.bot-card .bot-avatar {
  width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; position: relative;
  overflow: visible;
}
/* 头像编辑徽标 */
.avatar-edit-badge {
  position: absolute; bottom: -2px; right: -2px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; color: #F472B6;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  cursor: pointer; z-index: 2;
  transition: transform 0.2s;
}
.avatar-edit-badge:hover { transform: scale(1.15); }
.avatar-edit-badge svg { width: 11px; height: 11px; }

.bot-card .bot-name { font-size: 18px; font-weight: 800; }
.bot-card .bot-persona { font-size: 12px; opacity: 0.85; }
.bot-card .bot-status { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.bot-card .switch-btn {
  background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.3);
  color: #fff; padding: 8px 16px; border-radius: 12px; font-size: 13px; cursor: pointer;
  font-weight: 600; transition: all 0.2s; backdrop-filter: blur(4px); position: relative; z-index: 1;
}
.bot-card .switch-btn:hover { background: rgba(255,255,255,0.3); }

/* ===== 区块标题 ===== */
.section-label { font-size: 15px; font-weight: 700; color: #3A2030; margin: 20px 20px 10px; }

/* ===== 数据卡片 ===== */
.stats-row { display: flex; gap: 10px; margin: 0 20px; }
.stat-card {
  flex: 1; background: rgba(255,255,255,0.65); backdrop-filter: blur(8px);
  border-radius: 16px; padding: 14px; text-align: center;
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow: 0 3px 12px rgba(244, 114, 182,0.05);
  transition: all 0.25s;
}
.stat-card:active { transform: scale(0.96); }
.stat-value { font-size: 26px; font-weight: 800; }
.stat-label { font-size: 11px; color: #B090A0; margin-top: 4px; }
.stat-value.c-pink { color: #F472B6; }
.stat-value.c-purple { color: #C4B5FD; }
.stat-value.c-orange { color: #FFB347; }

/* ===== 快捷操作 ===== */
.quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 20px; }
.quick-action {
  background: rgba(255,255,255,0.65); backdrop-filter: blur(8px);
  border-radius: 16px; padding: 16px 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; border: 1.5px solid rgba(255,255,255,0.7);
  text-align: left; font-family: inherit;
  box-shadow: 0 3px 12px rgba(244, 114, 182,0.05);
  transition: all 0.25s;
}
.quick-action:hover, .quick-action:active {
  transform: translateY(-2px); border-color: rgba(244, 114, 182,0.2);
  box-shadow: 0 8px 20px rgba(244, 114, 182,0.1); background: #fff;
}
.qa-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
.qa-icon svg { width: 22px; height: 22px; }
.qa-label { font-size: 14px; font-weight: 700; color: #3A2030; }

/* ===== 通道状态 ===== */
.channel-row { display: flex; gap: 10px; margin: 0 20px; }
.channel-card {
  flex: 1; background: rgba(255,255,255,0.65); backdrop-filter: blur(8px);
  border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 10px;
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow: 0 3px 12px rgba(244, 114, 182,0.05);
  cursor: pointer; transition: all 0.25s; text-decoration: none; color: inherit;
}
.channel-card:hover { transform: translateY(-2px); border-color: rgba(244, 114, 182,0.2); box-shadow: 0 8px 20px rgba(244, 114, 182,0.1); }
.channel-card:active { transform: scale(0.97); }
/* opacity now handled by card-in-dim keyframe */
.ch-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.ch-icon svg { width: 24px; height: 24px; }
.ch-name { font-size: 13px; font-weight: 700; color: #3A2030; }
.ch-status { font-size: 11px; color: #4CAF50; display: flex; align-items: center; gap: 4px; }
.ch-status.off { color: #C0A0B0; }
.ch-status .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.ch-status .dot.on { background: #4CAF50; }
.ch-status .dot.off { background: #C0A0B0; }

/* 用户头像（自定义图片） */
.user-avatar-img {
  width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
  background: linear-gradient(135deg, #C4B5FD, #9B7ED8);
}

/* 响应式背景 */
.phone.custom-bg { background-size: cover; background-position: center; }

/* ===== Dark Mode — page-specific ===== */

.phone.dark-mode .username { color: #E8E0F0; }
.phone.dark-mode .top-btn { background: rgba(42,42,62,0.7); color: #9080A0; }

.phone.dark-mode .section-label { color: #E8E0F0; }
.phone.dark-mode .stat-card { background: rgba(42,42,62,0.65); border-color: rgba(255,255,255,0.06); }

.phone.dark-mode .quick-action .qa-label { color: #E8E0F0; }

.phone.dark-mode .channel-card { background: rgba(42,42,62,0.65); border-color: rgba(255,255,255,0.06); }
.phone.dark-mode .ch-name { color: #E8E0F0; }
</style>

<script>
// ===== Stat Counter Animation =====
(function() {
  var statValues = document.querySelectorAll('.stat-value');
  statValues.forEach(function(el) {
    var text = el.textContent.trim();
    var isPercent = text.includes('%');
    var target = parseFloat(text);
    if (isNaN(target)) return;
    var duration = 800;
    var start = performance.now();
    function update(now) {
      var progress = Math.min((now - start) / duration, 1);
      // Ease out cubic
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = Math.round(target * eased);
      el.textContent = isPercent ? current + '%' : current;
      if (progress < 1) requestAnimationFrame(update);
      else el.textContent = text; // restore original
    }
    el.textContent = isPercent ? '0%' : '0';
    requestAnimationFrame(update);
  });
})();
</script>

<script>
// ===== 聊天背景全局同步 =====
(function() {
  var CHAT_BG_KEY = 'chatBg';
  function applyBg(bgData) {
    var phone = document.getElementById('phoneFrame');
    if (!phone) return;
    phone.style.background = '';
    if (!bgData || bgData.type === 'default') {
      if (!phone.classList.contains('dark-mode')) phone.style.background = '#FFF5F7';
    } else if (bgData.type === 'custom' && bgData.value) {
      phone.style.background = 'url(' + bgData.value + ') center/cover no-repeat';
    } else if (bgData.value) {
      phone.style.background = bgData.value;
    }
  }
  function loadBg() {
    try {
      var raw = localStorage.getItem(CHAT_BG_KEY);
      if (!raw) return;
      applyBg(JSON.parse(raw));
    } catch(e) {}
  }
  loadBg();
  window.addEventListener('storage', function(e) {
    if (e.key === CHAT_BG_KEY && e.newValue) {
      try { applyBg(JSON.parse(e.newValue)); } catch(err) {}
    }
  });
})();
</script>

<script>
// ===== API 数据加载 — 首页仪表盘 =====
(function() {
  'use strict';

  // 未登录 → 跳转
  if (!API.isLoggedIn()) {
    location.href = '登录页.html';
    return;
  }

  // ── 加载仪表盘数据 ──
  API.getDashboard().then(function(d) {
    // 问候语 + 用户名
    var greetEl = document.querySelector('.greeting');
    var nameEl = document.querySelector('.username');
    if (greetEl) greetEl.textContent = d.greeting;
    if (nameEl) nameEl.textContent = d.user.nickname;

    // Bot 卡片（取第一个 Bot）
    var botCard = document.querySelector('.bot-card');
    if (d.bots.length > 0) {
      var b = d.bots[0];
      var nameEl2 = botCard && botCard.querySelector('.bot-name');
      var personaEl = botCard && botCard.querySelector('.bot-persona');
      var statusEl = botCard && botCard.querySelector('.bot-status');
      if (nameEl2) nameEl2.textContent = b.name;
      if (personaEl) personaEl.textContent = (b.personality || '') + ' · ' + (b.is_active ? '活跃' : '离线');
      if (statusEl) statusEl.innerHTML = b.is_active ? '<span style="color:#4CAF50;">●</span> 在线' : '<span style="color:#C0A0B0;">●</span> 离线';
      // 存储当前 bot_id 用于聊天跳转
      API.setCurrentBotId(b.id);
      botCard.onclick = function() { location.href = '聊天页.html?bot_id=' + b.id; };
    } else {
      if (botCard) {
        botCard.innerHTML = '<div class="row"><div class="bot-info"><div style="font-size:14px;opacity:0.8;">还没有 Bot，去创建一个吧</div></div></div>';
        botCard.onclick = function() { location.href = 'Bot创建向导.html'; };
      }
    }

    // 今日数据
    var statCards = document.querySelectorAll('.stat-value');
    if (statCards.length >= 3) {
      statCards[0].textContent = d.today.messages || 0;
      statCards[1].textContent = d.bots.length || 0;
      statCards[2].textContent = d.today.tier === 'platform' ? '平台' : '自有';
    }

    // 通道状态
    var chCards = document.querySelectorAll('.channel-card');
    if (chCards.length >= 2) {
      // QQ 通道 — 异步加载
      API.getQQStatus().then(function(qq) {
        var qqStatus = chCards[0].querySelector('.ch-status');
        if (qqStatus) {
          if (qq.connected) {
            qqStatus.innerHTML = '<span class="dot on"></span> 已连接';
            qqStatus.classList.remove('off');
          } else {
            qqStatus.innerHTML = '<span class="dot off"></span> 未连接';
            qqStatus.classList.add('off');
          }
        }
      }).catch(function() {});
      // 微信通道
      API.getWechatStatus().then(function(wx) {
        var wxStatus = chCards[1].querySelector('.ch-status');
        if (wxStatus) {
          if (wx.bound) {
            wxStatus.innerHTML = '<span class="dot on"></span> 已绑定';
            wxStatus.classList.remove('off');
          } else {
            wxStatus.innerHTML = '<span class="dot off"></span> 未绑定';
            wxStatus.classList.add('off');
          }
        }
      }).catch(function() {});
    }

    // 通知红点
    if (d.notifications && d.notifications.unread_count > 0) {
      var notifBtn = document.querySelector('.top-btn');
      if (notifBtn) {
        notifBtn.style.position = 'relative';
        var badge = document.createElement('span');
        badge.style.cssText = 'position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#F472B6;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;';
        badge.textContent = d.notifications.unread_count > 99 ? '99+' : d.notifications.unread_count;
        notifBtn.appendChild(badge);
      }
    }

    // 触发统计动画
    animateStats();
  }).catch(function(err) {
    console.error('Dashboard load error:', err);
  });

  // ── 统计动画 ──
  function animateStats() {
    var statValues = document.querySelectorAll('.stat-value');
    statValues.forEach(function(el) {
      var text = el.textContent.trim();
      var isPercent = text.includes('%');
      var target = parseFloat(text);
      if (isNaN(target)) return;
      var duration = 800;
      var start = performance.now();
      function update(now) {
        var progress = Math.min((now - start) / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        var current = Math.round(target * eased);
        el.textContent = isPercent ? current + '%' : current;
        if (progress < 1) requestAnimationFrame(update);
        else el.textContent = text;
      }
      el.textContent = isPercent ? '0%' : '0';
      requestAnimationFrame(update);
    });
  }

  // ── 聊天背景 ──
  (function() {
    var CHAT_BG_KEY = 'chatBg';
    function applyBg(bgData) {
      var phone = document.getElementById('phoneFrame');
      if (!phone) return;
      phone.style.background = '';
      if (!bgData || bgData.type === 'default') {
        if (!phone.classList.contains('dark-mode')) phone.style.background = '#FFF5F7';
      } else if (bgData.type === 'custom' && bgData.value) {
        phone.style.background = 'url(' + bgData.value + ') center/cover no-repeat';
      } else if (bgData.value) {
        phone.style.background = bgData.value;
      }
    }
    try { var raw = localStorage.getItem(CHAT_BG_KEY); if (raw) applyBg(JSON.parse(raw)); } catch(e) {}
    window.addEventListener('storage', function(e) {
      if (e.key === CHAT_BG_KEY && e.newValue) {
        try { applyBg(JSON.parse(e.newValue)); } catch(err) {}
      }
    });
  })();
})();
</script>
<script src="shared/app.js"></script>
</body>
