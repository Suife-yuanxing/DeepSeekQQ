# ruff 代码质量配置
# 运行: ruff check .
# 自动修复: ruff check --fix .

target-version = "py311"

line-length = 120

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "*.egg-info",
    "build",
    "dist",
    "data",
]

[lint]
# 启用的规则集
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "RUF",    # Ruff-specific rules
]

# 忽略的规则
ignore = [
    "E501",   # line too long (由 line-length 和 formatter 处理)
    "F401",   # unused import (__init__.py 需要)
    "B904",   # raise from within except
    "RUF001", # 中文字符在字符串中（本项目大量使用中文）
    "RUF002", # 中文字符在 docstring 中
    "RUF003", # 中文字符在注释中
]

# 单行 import 排序
[lint.isort]
force-single-line = true

[format]
# 类似 black 的格式化
quote-style = "double"
indent-style = "space"
