name: Council Skill CI

on:
  push:
    paths:
      - "skills/council/**"
      - ".github/workflows/council-test.yml"
  pull_request:
    paths:
      - "skills/council/**"
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skills/council/requirements.txt
          pip install pytest

      - name: Run council tests
        working-directory: skills/council/scripts
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pytest test_boundary.py -v --tb=short

      - name: Verify dedup algorithm
        working-directory: skills/council/scripts
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python verify_dedup.py
